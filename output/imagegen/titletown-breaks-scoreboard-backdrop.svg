<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Titletown Breaks scoreboard backdrop</title>
  <desc id="desc">A Lambeau-inspired scoreboard backdrop with a large center screen designed to hold a four-row team logo layout.</desc>
  <defs>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8893a0"/>
      <stop offset="0.55" stop-color="#c2cbd5"/>
      <stop offset="1" stop-color="#5c6672"/>
    </linearGradient>
    <linearGradient id="deepSteel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#47515d"/>
      <stop offset="1" stop-color="#1d2630"/>
    </linearGradient>
    <linearGradient id="packerGreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#234f2a"/>
      <stop offset="1" stop-color="#112f18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7efbd"/>
      <stop offset="0.55" stop-color="#d9c47b"/>
      <stop offset="1" stop-color="#9d7f42"/>
    </linearGradient>
    <linearGradient id="screenFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172638"/>
      <stop offset="0.4" stop-color="#22334b"/>
      <stop offset="0.7" stop-color="#182738"/>
      <stop offset="1" stop-color="#0a1119"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <ellipse cx="960" cy="892" rx="690" ry="34" fill="#000000" opacity="0.12"/>

  <g filter="url(#softShadow)" stroke="#d4dbe2" stroke-width="6" stroke-linecap="round" opacity="0.92">
    <path d="M470 236 H1450"/>
    <path d="M520 236 L610 290"/>
    <path d="M610 236 L700 290"/>
    <path d="M700 236 L790 290"/>
    <path d="M790 236 L880 290"/>
    <path d="M1040 236 L1130 290"/>
    <path d="M1130 236 L1220 290"/>
    <path d="M1220 236 L1310 290"/>
    <path d="M1310 236 L1400 290"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="144" width="720" height="86" rx="12" fill="url(#packerGreen)" stroke="url(#gold)" stroke-width="5"/>
    <text x="960" y="202" fill="#f8efbf" font-family="Georgia, serif" font-size="60" font-weight="700" letter-spacing="4" text-anchor="middle">TITLETOWN BREAKS</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M280 900 L372 316 H438 L352 900 Z" fill="url(#steel)"/>
    <path d="M1640 900 L1548 316 H1614 L1700 900 Z" fill="url(#steel)"/>

    <rect x="320" y="292" width="1280" height="510" rx="18" fill="url(#deepSteel)" stroke="#cfd7df" stroke-width="6"/>
    <rect x="338" y="306" width="1244" height="482" rx="12" fill="#0f1822" stroke="#7d8997" stroke-width="3"/>
    <rect x="360" y="330" width="1200" height="380" rx="10" fill="url(#screenFill)"/>
    <rect x="360" y="330" width="1200" height="14" fill="#f2e8b6" opacity="0.18"/>
    <rect x="360" y="688" width="1200" height="22" fill="#0a1118" opacity="0.88"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="258" y="804" width="1404" height="22" rx="5" fill="#314332" stroke="#dac46f" stroke-width="3"/>
    <rect x="286" y="808" width="160" height="12" rx="3" fill="#162218"/>
    <rect x="1474" y="808" width="160" height="12" rx="3" fill="#162218"/>
    <text x="366" y="819" fill="#ddc771" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="700" text-anchor="middle">LIVE TEAM BOARD</text>
    <text x="1554" y="819" fill="#ddc771" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="700" text-anchor="middle">BREAKS OVERLAY</text>
  </g>

  <g fill="#d7c26e" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="700" text-anchor="middle" opacity="0.95">
    <text x="620" y="860">HOME 14</text>
    <text x="770" y="860">AWAY 10</text>
    <text x="940" y="860">QTR 4</text>
    <text x="1110" y="860">09:58</text>
    <text x="1288" y="860">PICKS LIVE</text>
  </g>

  <g fill="#131b24" opacity="0.96">
    <path d="M300 834 C338 816 376 816 414 834 C452 816 490 816 528 834 C566 816 604 816 642 834 C680 816 718 816 756 834 C794 816 832 816 870 834 C908 816 946 816 984 834 C1022 816 1060 816 1098 834 C1136 816 1174 816 1212 834 C1250 816 1288 816 1326 834 C1364 816 1402 816 1440 834 C1478 816 1516 816 1554 834 C1592 816 1630 816 1668 834 L1668 878 L300 878 Z"/>
  </g>
</svg>
